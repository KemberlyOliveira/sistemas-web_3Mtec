<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Página Listar Usuarios</title>
</head>
<body>
    <h2>Lista de Usuários</h2>

<table border="1">
    <tr>
        <th>ID</th>
        <th>Nome</th>
        <th>Username</th>
        <th>Telefone</th>
        <th>Role</th>
        <th>Senha (criptografada)</th> // meramente ilistrativo, para mostrar q criptografa certinhop
    </tr>

    <tr th:each="usuario : ${}">
        <td th:text="${usuario.id}"></td>
        <td th:text="${usuario.nome}"></td>
        <td th:text="${usuario.telefone}"></td>
        <td th:text="${usuario.username}"></td>
        <td th:text="${usuario.role}"></td>
        <td th:text="${usuario.password}"></td> // meramente ilistrativo, para mostrar q criptografa certinhop
    </tr>
    </tr>

</table>

<br>
<a th:href="@{/usuarioCTR/}">Novo Usuário</a>

</body>
</html>
